<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dinosaur Landing Page</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">DINO WORLD</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">The Adventure</a>
      <a href="#">Education</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">

    <!-- Floating Card -->
    <div class="hero-card">
      <span>WELCOME TO</span>
      <h1>JURASSIC PARK</h1>
      <p>Enter Prehistoric Chaos</p>
    </div>

    <!-- Background Overlay -->
    <div class="overlay"></div>

    <!-- Left Dinosaur -->
    <img
      src="https://plus.unsplash.com/premium_photo-1742353866641-416afc26109c?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      class="dino left-dino"
      alt="Dinosaur"
      height="90%"
    />

    <!-- Right Dinosaur -->
    <img
      src="https://images.unsplash.com/photo-1682802061830-e5702efe0d7a?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGRpbm9zYXVyc3xlbnwwfHwwfHx8MA%3D%3D"
      class="dino right-dino"
      alt="Dinosaur"
      height="80%"
    />

    <!-- Gate -->
    <div class="gate">
      <div class="gate-arch"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <p>
        Explore the prehistoric world filled with mystery, adventure,
        and giant creatures from another age.
      </p>

      <div class="buttons">
        <div class="btn-group">
          <span>DINOSAURS</span>
          <button>Start Journey</button>
        </div>

        <div class="btn-group">
          <span>WILDLIFE</span>
          <button>Discover</button>
        </div>

        <div class="btn-group">
          <span>VIDEO GAME</span>
          <button>Install Now</button>
        </div>
      </div>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
